<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Jobbsök">
<title>Jobbsök</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ebebea;
    --text: #1a1a1a;
    --text2: #666663;
    --text3: #999997;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f5f5f0;
      --text2: #aeaead;
      --text3: #6e6e6c;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 420px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; }
  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }
  .week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .nav-btn { width: 36px; height: 36px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .week-label { flex: 1; text-align: center; font-size: 14px; font-weight: 500; color: var(--text); }
  .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .section-title { font-size: 12px; color: var(--text2); letter-spacing: 0.04em; }
  .score-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .score-full { background: #d4edda; color: #155724; }
  .score-partial { background: #fff3cd; color: #856404; }
  .score-empty { background: var(--bg2); color: var(--text2); }
  @media (prefers-color-scheme: dark) {
    .score-full { background: #0f3a1e; color: #6fcf8a; }
    .score-partial { background: #3a2e00; color: #f4c842; }
  }
  .progress-bar-wrap { height: 5px; background: var(--bg3); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 10px; transition: width 0.3s; }
  .tasks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .task-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .task-row.done { opacity: 0.45; }
  .task-row.done .task-text { text-decoration: line-through; color: var(--text2); }
  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { background: #1D9E75; border-color: #1D9E75; }
  .checkmark { width: 10px; height: 7px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); display: none; }
  .checkbox.checked .checkmark { display: block; }
  .task-text { font-size: 15px; color: var(--text); flex: 1; }
  .task-type { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .add-btn { width: 100%; padding: 11px; border: 0.5px dashed var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  .add-btn:active { background: var(--bg2); }
  .delete-btn { width: 20px; height: 20px; border: none; background: transparent; color: var(--text3); font-size: 16px; cursor: pointer; flex-shrink: 0; padding: 0; line-height: 1; }
</style>
</head>
<body>

<h1>Jobbsök &#128204;</h1>

<div class="summary-row">
  <div class="stat">
    <div class="stat-label">Veckor aktiv</div>
    <div class="stat-val" id="weeks-active">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Streak &#9733;</div>
    <div class="stat-val" id="streak-val">0v</div>
  </div>
</div>

<div class="week-nav">
  <button class="nav-btn" id="prev-btn" onclick="changeWeek(-1)">&#8592;</button>
  <div class="week-label" id="week-label"></div>
  <button class="nav-btn" id="next-btn" onclick="changeWeek(1)">&#8594;</button>
</div>

<div class="score-row">
  <div class="section-title">Veckans tasks</div>
  <div class="score-badge" id="score-badge"></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
</div>

<div class="tasks" id="task-list"></div>
<button class="add-btn" onclick="addTask()">+ Lägg till task</button>

<script>
const DEFAULT_TASKS = [
  { id: 'a1', text: 'Sökt annons', type: 'Annons' },
  { id: 'a2', text: 'Sökt annons', type: 'Annons' },
  { id: 'a3', text: 'Sökt annons', type: 'Annons' },
  { id: 'd1', text: 'Direktkontakt (ring/mejl)', type: 'Direkt' },
  { id: 'n1', text: 'Nätverkskontakt', type: 'Nätverk' },
];

let state = JSON.parse(localStorage.getItem('jobbsok_v3') || '{}');
let currentOffset = 0;

function getWeekKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay()+6)%7) + offset * 7);
  return d.getFullYear() + '-W' + String(getWeekNum(d)).padStart(2,'0');
}

function getWeekNum(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay()||7));
  const y = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - y) / 86400000) + 1) / 7);
}

function getWeekLabel(offset) {
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay()+6)%7) + offset * 7);
  const mon = new Date(d);
  const sun = new Date(d);
  sun.setDate(mon.getDate() + 6);
  const fmt = x => x.getDate() + '/' + (x.getMonth()+1);
  return fmt(mon) + ' – ' + fmt(sun) + (offset === 0 ? ' (nu)' : '');
}

function getWeekData(key) {
  if (!state[key]) {
    state[key] = { tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)), extra: [] };
  }
  return state[key];
}

function save() { localStorage.setItem('jobbsok_v3', JSON.stringify(state)); }

function calcStreak() {
  let streak = 0, offset = 0;
  while (offset >= -52) {
    const key = getWeekKey(offset);
    const d = state[key];
    if (!d) break;
    const all = [...(d.tasks||[]),...(d.extra||[])];
    if (all.some(t => t.done)) { streak++; offset--; } else break;
  }
  return streak;
}

function render() {
  const key = getWeekKey(currentOffset);
  const data = getWeekData(key);
  const all = [...data.tasks, ...data.extra];
  const score = all.filter(t => t.done).length;
  const total = all.length;
  const pct = total > 0 ? Math.round((score/total)*100) : 0;

  document.getElementById('week-label').textContent = getWeekLabel(currentOffset);
  document.getElementById('prev-btn').disabled = currentOffset <= -12;
  document.getElementById('next-btn').disabled = currentOffset >= 0;

  const badge = document.getElementById('score-badge');
  badge.textContent = score + '/' + total;
  badge.className = 'score-badge ' + (score === total && total > 0 ? 'score-full' : score > 0 ? 'score-partial' : 'score-empty');

  document.getElementById('prog-bar').style.width = pct + '%';

  const weeksActive = Object.keys(state).filter(k => {
    const d = state[k];
    return [...(d.tasks||[]),...(d.extra||[])].some(t => t.done);
  }).length;
  document.getElementById('weeks-active').textContent = weeksActive;
  document.getElementById('streak-val').textContent = calcStreak() + 'v';

  const list = document.getElementById('task-list');
  list.innerHTML = '';
  all.forEach((task, i) => {
    const isExtra = i >= data.tasks.length;
    const row = document.createElement('div');
    row.className = 'task-row' + (task.done ? ' done' : '');
    row.innerHTML = `
      <div class="checkbox ${task.done?'checked':''}"><div class="checkmark"></div></div>
      <div class="task-text">${task.text}</div>
      <div class="task-type">${task.type||''}</div>
      ${isExtra ? '<button class="delete-btn" title="Ta bort">&#215;</button>' : ''}
    `;
    row.querySelector('.checkbox').addEventListener('click', e => {
      e.stopPropagation();
      task.done = !task.done;
      save(); render();
    });
    row.querySelector('.task-text').addEventListener('click', () => {
      task.done = !task.done;
      save(); render();
    });
    if (isExtra) {
      row.querySelector('.delete-btn').addEventListener('click', e => {
        e.stopPropagation();
        data.extra.splice(i - data.tasks.length, 1);
        save(); render();
      });
    }
    list.appendChild(row);
  });
}

function changeWeek(dir) {
  currentOffset = Math.min(0, Math.max(-12, currentOffset + dir));
  render();
}

function addTask() {
  const text = prompt('Beskriv tasken:');
  if (!text || !text.trim()) return;
  const key = getWeekKey(currentOffset);
  const data = getWeekData(key);
  data.extra.push({ id: 'e_' + Date.now(), text: text.trim(), type: 'Övrigt', done: false });
  save(); render();
}

render();
</script>
</body>
</html>
